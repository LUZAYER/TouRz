<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="shortcut icon" href="logo2.png" type="image/x-icon" />
  <title>TouRz@Registration</title>
  <style> p { font-size: 1vw !important; } </style>
</head>

<body onload="loadHTML('header.php', 'header'); loadHTML('footer.html', 'footer'); showOverlayWithSpinner();">
  <div id="header"></div>

  <section class="h-100 gradient-form" style="background-color: #eee;">
    <div class="container py-5 h-100">
      <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-xl-10">
          <div class="card rounded-3 text-black">
            <div class="row g-0">

              <div class="col-lg-6 d-flex align-items-center gradient-custom-2">
                <div class="text-white px-3 py-4 p-md-5 mx-md-4">
                  <img src="logo.png" alt="">
                </div>
              </div>

              <div class="col-lg-6">
                <div class="card-body p-md-5 mx-md-4">
                  <div class="text-center">
                    <h1>Register Your Account</h1>
                  </div><br><br>

                  <form action="register.php" method="POST">
                      <div class="form-floating mb-4">
                        <input type="text" name="name" class="form-control" id="name" placeholder="Full Name" required>
                        <label for="name">Full Name</label>
                      </div>
                    
                      <div class="form-floating mb-4">
                        <input type="email" name="email" class="form-control" id="email" placeholder="Email" required>
                        <label for="email">Email</label>
                      </div>
                    
                      <div class="form-floating mb-4">
                        <input type="password" name="password" class="form-control" id="password" placeholder="Password" required>
                        <label for="password">Password</label>
                      </div>
                    
                      <div class="form-floating mb-4">
                        <input type="text" name="phone" class="form-control" id="phone" placeholder="Contact Number">
                        <label for="phone">Contact Number</label>
                      </div>
                    
                      <div class="text-center pt-1 mb-5 pb-1">
                        <button class="btn btn-primary btn-block fa-lg gradient-custom-2 mb-3" type="submit">
                          Register
                        </button>
                      </div>
                    
                      <div class="d-flex align-items-center justify-content-center pb-4">
                        <p class="mb-0 me-2">Have an account?</p>
                        <a href="login.html" class="btn btn-outline-danger">Log In</a>
                      </div>
                  </form>


                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
